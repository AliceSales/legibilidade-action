name: "Análise de Legibilidade"
description: "Analisa arquivos Java usando uma API de modelo hospedada"

inputs:
  api-url:
    description: "URL da API do modelo"
    required: true

outputs:
  average:
    description: "Nota média final"
    value: ${{ steps.analysis.outputs.average }}
  status:
    description: "Status da análise"
    value: ${{ steps.analysis.outputs.status }}

runs:
  using: "composite"
  steps:
    - name: Instalar dependências Python
      shell: bash
      run: pip install requests

    - name: Rodar análise
      id: analysis
      shell: bash
      run: python ${{ github.action_path }}/analyzer.py "${{ inputs.api-url }}"