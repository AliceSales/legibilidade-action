name: "Análise de Legibilidade"
description: "Analisa arquivos Java com JavaParser e envia features para API"

inputs:
  api-url:
    description: "URL da API do modelo"
    required: true

runs:
  using: "composite"
  steps:
    - name: Configurar Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "17"

    - name: Buildar Action Java
      shell: bash
      run: mvn -f "${{ github.action_path }}/pom.xml" clean package -DskipTests

    - name: Rodar análise
      shell: bash
      run: java -jar "${{ github.action_path }}/target/legibilidade-action-1.0.0.jar" "${{ inputs.api-url }}"